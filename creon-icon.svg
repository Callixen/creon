<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0d12"/>

  <!-- Scales icon centered, scaled up -->
  <!-- Pivot stem -->
  <line x1="200" y1="148" x2="200" y2="268" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="152" y1="268" x2="248" y2="268" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Pivot dot -->
  <circle cx="200" cy="148" r="14" fill="#ffffff"/>
  <!-- Beam -->
  <line x1="106" y1="148" x2="294" y2="148" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Left hang -->
  <line x1="116" y1="148" x2="116" y2="200" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <!-- Right hang (lower — tipping) -->
  <line x1="284" y1="148" x2="284" y2="224" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M 82 200 Q 116 216 150 200" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M 250 224 Q 284 240 318 224" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
</svg>
